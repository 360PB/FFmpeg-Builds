name: Sync to Gitee

on:
  push:
    branches: [master, main]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  sync-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Sync code & tags to Gitee
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_PASSWORD: ${{ secrets.GITEE_PASSWORD }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git remote add gitee https://${GITEE_USERNAME}:${GITEE_PASSWORD}@gitee.com/${GITEE_USERNAME}/FFmpeg-Builds.git
          git push gitee --all --force
          git push gitee --tags --force

  sync-releases:
    runs-on: ubuntu-latest
    needs: sync-code
    steps:
      - name: Sync GitHub Releases to Gitee
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_PASSWORD: ${{ secrets.GITEE_PASSWORD }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -e
          echo "Fetching GitHub releases..."
          gh_releases=$(curl -s -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/BtbN/FFmpeg-Builds/releases?per_page=10")
          echo "Fetching Gitee releases..."
          gitee_releases=$(curl -s "https://gitee.com/api/v5/repos/${GITEE_USERNAME}/FFmpeg-Builds/releases?access_token=${GITEE_PASSWORD}&per_page=100")
          echo "$gh_releases" | python3 -c "
import json, sys, os, urllib.request, urllib.parse, urllib.error

try:
    releases = json.load(sys.stdin)
except:
    print('No releases or parse error')
    sys.exit(0)

if not releases:
    print('No releases found')
    sys.exit(0)

gitee_user = os.environ.get('GITEE_USERNAME', '')
gitee_token = os.environ.get('GITEE_PASSWORD', '')
gitee_url = f'https://gitee.com/api/v5/repos/{gitee_user}/FFmpeg-Builds/releases'

for release in releases:
    tag = release.get('tag_name', '')
    name = release.get('name', tag)
    body = release.get('body', '') or 'FFmpeg Builds Release'
    prerelease = release.get('prerelease', False)
    
    assets = []
    for a in release.get('assets', []):
        assets.append(f\"- [{a.get('name','')}]({a.get('browser_download_url','')}) ({a.get('size',0)/1024/1024:.1f} MB)\")
    
    if assets:
        body += '\n\n---\n\n**预编译文件下载（GitHub 源）：**\n\n' + '\n'.join(assets)
    
    body += '\n\n---\n\n> 自动同步自 [BtbN/FFmpeg-Builds](https://github.com/BtbN/FFmpeg-Builds/releases)'
    
    check_url = f'{gitee_url}?access_token={gitee_token}&tag_name={urllib.parse.quote(tag)}'
    try:
        r = urllib.request.urlopen(check_url, timeout=10)
        if json.loads(r.read().decode()).get('tag_name') == tag:
            print(f'Skip {tag}')
            continue
    except urllib.error.HTTPError as e:
        if e.code != 404:
            print(f'Check error {tag}: {e.code}')
    except Exception as e:
        print(f'Check error {tag}: {e}')
    
    data = urllib.parse.urlencode({
        'tag_name': tag,
        'name': name,
        'body': body,
        'prerelease': str(prerelease).lower()
    }).encode()
    
    try:
        req = urllib.request.Request(f'{gitee_url}?access_token={gitee_token}', data=data, method='POST')
        req.add_header('Content-Type', 'application/x-www-form-urlencoded')
        r = urllib.request.urlopen(req, timeout=30)
        print(f'Created {tag}: {json.loads(r.read().decode()).get(\"url\", \"OK\")}')
    except Exception as e:
        print(f'Failed {tag}: {e}')
" || echo "Python3 not available, skipping release sync"
          echo "Release sync completed!"
