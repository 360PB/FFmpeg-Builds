name: Sync to Gitee

on:
  push:
    branches: [master, main]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  sync-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Sync code & tags to Gitee
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_PASSWORD: ${{ secrets.GITEE_PASSWORD }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git remote add gitee https://${GITEE_USERNAME}:${GITEE_PASSWORD}@gitee.com/${GITEE_USERNAME}/FFmpeg-Builds.git
          git push gitee --all --force
          git push gitee --tags --force

  sync-releases:
    runs-on: ubuntu-latest
    needs: sync-code
    steps:
      - name: Sync popular release assets to Gitee
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_PASSWORD: ${{ secrets.GITEE_PASSWORD }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -e

          GITEE_API="https://gitee.com/api/v5/repos/${GITEE_USERNAME}/FFmpeg-Builds"
          GH_API="https://api.github.com/repos/BtbN/FFmpeg-Builds"
          WORK_DIR="/tmp/release_sync"
          mkdir -p "$WORK_DIR"

          echo "=== Fetching latest GitHub release ==="
          curl -s -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            "${GH_API}/releases/latest" > "$WORK_DIR/latest.json"

          TAG=$(jq -r '.tag_name' "$WORK_DIR/latest.json")
          REL_NAME=$(jq -r '.name' "$WORK_DIR/latest.json")
          REL_BODY=$(jq -r '.body // "FFmpeg Builds Release"' "$WORK_DIR/latest.json")
          PRERELEASE=$(jq -r '.prerelease' "$WORK_DIR/latest.json")

          echo "GitHub Release: ${TAG} - ${REL_NAME}"

          echo "=== Checking Gitee release ==="
          GITEE_REL=$(curl -s -w "\n%{http_code}" \
            "${GITEE_API}/releases?access_token=${GITEE_PASSWORD}&tag_name=${TAG}")
          GITEE_STATUS=$(echo "$GITEE_REL" | tail -n1)
          GITEE_BODY=$(echo "$GITEE_REL" | head -n-1)

          GITEE_REL_ID=""
          if [ "$GITEE_STATUS" = "200" ] && echo "$GITEE_BODY" | jq -e '.tag_name' > /dev/null 2>&1; then
            GITEE_REL_ID=$(echo "$GITEE_BODY" | jq -r '.id')
            echo "Gitee release exists: id=${GITEE_REL_ID}"
          else
            echo "Creating Gitee release..."
            CREATE_BODY="${REL_BODY}\n\n---\n\n> 自动同步自 [BtbN/FFmpeg-Builds](https://github.com/BtbN/FFmpeg-Builds/releases)\n> 热门文件已托管，其他文件见 GitHub 原址。"
            CREATE_RESP=$(curl -s -X POST \
              "${GITEE_API}/releases?access_token=${GITEE_PASSWORD}" \
              -d "tag_name=${TAG}" \
              -d "target_commitish=master" \
              -d "name=${REL_NAME}" \
              --data-urlencode "body=${CREATE_BODY}" \
              -d "prerelease=${PRERELEASE}")
            GITEE_REL_ID=$(echo "$CREATE_RESP" | jq -r '.id // empty')
            if [ -z "$GITEE_REL_ID" ] || [ "$GITEE_REL_ID" = "null" ]; then
              echo "Failed to create Gitee release: ${CREATE_RESP}"
              exit 1
            fi
            echo "Created Gitee release: id=${GITEE_REL_ID}"
          fi

          echo "=== Fetching existing Gitee attachments ==="
          GITEE_ATTACH=$(curl -s "${GITEE_API}/releases/${GITEE_REL_ID}/attach_files?access_token=${GITEE_PASSWORD}")
          EXISTING_NAMES=$(echo "$GITEE_ATTACH" | jq -r '.[].name // empty')

          echo "=== Getting GitHub asset URLs ==="
          ASSETS=$(jq -c '.assets[] | {name, url: .browser_download_url, size}' "$WORK_DIR/latest.json")

          declare -A POPULAR_FILES
          POPULAR_FILES["checksums.sha256"]=1
          POPULAR_FILES["ffmpeg-master-latest-win64-gpl.zip"]=1
          POPULAR_FILES["ffmpeg-master-latest-linux64-gpl.tar.xz"]=1
          POPULAR_FILES["ffmpeg-n7.1-latest-win64-gpl-7.1.zip"]=1
          POPULAR_FILES["ffmpeg-n7.1-latest-linux64-gpl-7.1.tar.xz"]=1

          echo "$ASSETS" | while IFS= read -r asset; do
            NAME=$(echo "$asset" | jq -r '.name')
            URL=$(echo "$asset" | jq -r '.url')
            SIZE=$(echo "$asset" | jq -r '.size')

            if [ -z "${POPULAR_FILES[$NAME]}" ]; then
              echo "SKIP (not in hotlist): ${NAME}"
              continue
            fi

            if echo "$EXISTING_NAMES" | grep -qx "$NAME"; then
              echo "SKIP (already on Gitee): ${NAME}"
              continue
            fi

            SIZE_MB=$(echo "scale=1; ${SIZE} / 1024 / 1024" | bc)
            echo "DOWNLOAD: ${NAME} (${SIZE_MB} MB)"

            LOCAL_FILE="${WORK_DIR}/${NAME}"
            curl -s -L --fail -o "$LOCAL_FILE" "$URL"
            echo "  Downloaded: ${NAME}"

            echo "UPLOAD: ${NAME} to Gitee..."
            UPLOAD_RESP=$(curl -s -X POST \
              "${GITEE_API}/releases/${GITEE_REL_ID}/attach_files?access_token=${GITEE_PASSWORD}" \
              -F "file=@${LOCAL_FILE}")

            UPLOAD_NAME=$(echo "$UPLOAD_RESP" | jq -r '.name // empty')
            if [ -n "$UPLOAD_NAME" ] && [ "$UPLOAD_NAME" != "null" ]; then
              echo "  Uploaded OK: ${UPLOAD_NAME}"
            else
              echo "  Upload response: ${UPLOAD_RESP}"
            fi

            rm -f "$LOCAL_FILE"
            echo "  Cleaned up: ${NAME}"
          done

          echo "=== Release sync completed ==="
